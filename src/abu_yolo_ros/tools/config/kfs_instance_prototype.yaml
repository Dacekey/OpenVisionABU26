range_filter:
  mode: "bbox_size"
  min_symbol_height_px: 60
  min_symbol_area_px: 4000
  min_confidence: 0.25
  max_distance_m: 1.0
  min_distance_m: 0.2

clustering:
  cluster_distance_scale: 2.5
  min_cluster_distance_px: 35
  max_cluster_distance_px: 180
  max_depth_diff_m: 0.25
  max_symbols_per_instance: 3
  min_height_similarity_for_grouping: 0.60
  min_area_similarity_for_grouping: 0.30
  max_bottom_y_diff_ratio: 1.2

cluster_merge:
  enabled: true
  merge_same_group_only: true
  max_symbols_after_merge: 3
  min_expanded_iou: 0.03
  min_expanded_intersection_over_min_area: 0.12
  max_expanded_gap_px: 40
  max_union_center_distance_px: 550
  allow_center_distance_only_merge: false
  min_color_mask_coverage_for_merge: 0.15
  use_distance_check: false
  max_distance_diff_m: 0.35
  max_merged_union_width_scale: 2.2
  max_merged_union_height_scale: 2.6

merge:
  low_mask_adjacent_same_group_fallback:
    enabled: true
    require_same_group_type: true
    reject_ambiguous: true
    reject_real_fake_mix: true
    max_symbols_after_merge: 3
    require_height_similarity: true
    min_height_similarity: 0.55
    require_bottom_y_consistency: true
    max_bottom_y_diff_ratio: 1.35
    require_small_gap: true
    max_gap_px: 45
    max_gap_ratio_to_symbol_height: 0.55
    max_merged_aspect_ratio: 2.2
    max_merged_width_scale: 2.2
    max_merged_height_scale: 2.6
    log_rejected_candidates: true

merge_ranking:
  enabled: true
  prefer_same_face_alignment: true
  prefer_vertical_or_horizontal_face_consistency: true
  prefer_larger_intersection_or_overlap: true
  prefer_smaller_gap: true
  prefer_closer_centers: true
  prefer_similar_scale: true
  prefer_same_or_compatible_class_family: true
  weights:
    overlap: 2.0
    gap: 1.5
    center_distance: 1.0
    scale_similarity: 1.0
    face_alignment: 2.0
    same_class_family: 1.0
    color_support: 0.5
  use_vertical_stack_prior: true
  vertical_stack_weight: 1.0
  cross_depth_penalty_weight: 1.0
  vertical_stack_min_x_overlap_ratio: 0.25
  vertical_stack_max_center_x_gap_norm: 0.45
  vertical_stack_min_y_separation_norm: 0.15
  vertical_stack_max_merged_aspect_ratio: 2.8
  vertical_stack_max_area_growth_ratio: 3.5
  cross_depth_min_y_separation_norm: 0.25
  cross_depth_low_x_overlap_ratio: 0.15
  foreground_occlusion:
    enabled: true
    weight: 0.9
    same_foreground_band_weight: 1.0
    bottom_y_similarity_weight: 1.0
    vertical_order_weight: 0.6
    occlusion_penalty_weight: 1.0
    max_bottom_y_gap_norm: 0.55
    max_center_y_gap_norm: 0.85
    max_foreground_band_gap_norm: 0.65
  anti_occlusion_steal:
    enabled: true
    weight: 1.25
    require_competing_candidate: true
    min_x_overlap_ratio: 0.80
    max_center_x_gap_norm: 0.12
    min_center_y_gap_norm: 0.75
    min_bottom_y_gap_norm: 0.75
    require_negative_foreground_occlusion: true
    min_score_margin_to_apply: 0.0
    prefer_candidate_with_lower_occlusion_penalty: true
    prefer_candidate_with_better_foreground_band: true
    debug: true
  debug: true

bbox:
  use_square_symbol_bbox: true
  square_symbol_scale: 1.0
  max_square_side_ratio_of_image: 0.35
  clustering_center_source: "raw"
  expand_scale: 1.6
  expand_scale_x: 1.8
  expand_scale_y: 1.8
  max_expanded_area_ratio: 0.25

roi_filter:
  enabled: true
  # preset: "center_working_area"
  preset: "none"
  mode: "normalized_box"
  x_min_norm: 0.0
  x_max_norm: 0.78
  y_min_norm: 0.22
  y_max_norm: 1.0
  polygon: []

hsv_mask:
  mode: "red_or_blue_or_dark_blue"

  red_h_low_1: 0
  red_h_high_1: 12
  red_h_low_2: 168
  red_h_high_2: 180
  red_s_low: 130
  red_v_low: 80

  blue_h_low: 90
  blue_h_high: 140
  blue_s_low: 40
  blue_v_low: 80

  dark_blue_h_low: 90
  dark_blue_h_high: 140
  dark_blue_s_low: 20
  dark_blue_v_low: 15
  dark_blue_v_high: 160

contour:
  enabled: true
  min_contour_area_px: 300
  morphology_kernel_size: 5
  morphology_iterations: 1
  selection: "closest_to_symbol_union_center"
  max_center_offset_ratio: 1.0
  min_refined_to_union_area_ratio: 0.5

refinement:
  neighbor_aware_clamp: true
  neighbor_overlap_margin_px: 10
  protect_other_cluster_symbols: true
  neighbor_protection_bbox_source: "geometry"
  edge_clip_margin_px: 3
  drop_edge_clipped: false

aggregation:
  drop_ambiguous_clusters: true

debug_white_mask:
  enabled: true
  s_high: 80
  v_low: 150
  debug_only: true
